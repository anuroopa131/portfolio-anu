<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      // GitHub Pages serves this file for ANY path it doesn't recognize as
      // a real file (e.g. /portfolio-anu/experience). Since BrowserRouter
      // routes are virtual (they only exist inside React, not as real
      // files), every direct route hit lands here.
      //
      // Instead of showing an error, we rewrite the URL into a query
      // string and redirect to the real index.html. The script in
      // index.html then decodes it back into a normal path.

      // pathSegmentsToKeep = 1 because your site lives one folder deep:
      // https://anuroopa131.github.io/portfolio-anu/...
      // That "portfolio-anu" segment must be preserved as-is.
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1 + pathSegmentsToKeep)
            .split("/")
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
